<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mad Curtis Company</title>
    <style>
        /* Estilos globales inspirados en Disney Company */
        body { 
            background-color: #ffffff; 
            color: #2c2c2c; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
        }
        
        /* Barra de navegación superior fija y limpia */
        header { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 40px; 
            border-bottom: 1px solid #e5e5e5;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Contenedor del logotipo e isotipo */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Imagen de tu logotipo (el ratón/tu icono corporativo) */
        .brand-icon {
            height: 32px;
            width: auto;
        }

        /* Texto del logotipo oficial */
        .brand-logo { 
            font-size: 21px; 
            font-weight: 700; 
            color: #111111;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
        
        /* Menú de opciones solicitado */
        nav a { 
            color: #555555; 
            margin-left: 25px; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 500; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }
        
        nav a:hover { 
            color: #000000; 
        }

        /* Bloque principal de presentación (Hero Banner) */
        .hero-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 100px 40px;
            text-align: center;
            border-bottom: 1px solid #e5e5e5;
        }

        .hero-section h1 {
            font-size: 42px;
            font-weight: 800;
            color: #111111;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }

        .hero-section p {
            font-size: 18px;
            color: #666666;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Sección de contenidos o cartelera */
        .content-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 10px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 40px;
            height: 3px;
            background-color: #111111;
        }

        .grid-layout { 
            display: flex; 
            gap: 30px; 
        }
        
        .item-card { 
            background: #ffffff; 
            border: 1px solid #e5e5e5;
            border-radius: 4px; 
            overflow: hidden;
            width: 280px; 
            text-align: left;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        
        .item-card img { 
            width: 100%; 
            height: 380px;
            object-fit: cover;
            border-bottom: 1px solid #e5e5e5;
        }

        .item-info {
            padding: 20px;
        }
        
        .item-info a { 
            display: inline-block; 
            color: #111111; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 18px;
        }
        
        .item-info a:hover { 
            color: #555555; 
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <!-- AQUÍ VA TU ICONO PROPIO (EL REEMPLAZO DEL RATÓN) -->
            <!-- Cuando subas tu imagen, cambias este enlace provisional por: images/tu-icono.png -->
            <img class="brand-icon" src="https://placeholder.com" alt="Icono">
            
            <!-- TU LOGOTIPO CORPORATIVO TEXTUAL -->
            <div class="brand-logo">The Mad Curtis Company</div>
        </div>
        
        <nav>
            <a href="#">About</a>
            <a href="#">mad.com</a> <!-- Reemplazo de Investor Relations -->
            <a href="#">Newsroom</a>
            <a href="#">Impact</a>
            <a href="#">Careers</a>
        </nav>
    </header>

    <div class="hero-section">
        <h1>Inspirando a través de la creatividad</h1>
        <p>Creamos historias, experiencias y universos visuales únicos bajo el sello independiente de The Mad Curtis Company.</p>
    </div>

    <div class="content-container">
        <h2 class="section-title">Nuestras Producciones</h2>
        
        <div class="grid-layout">
            <div class="item-card">
                <!-- Cuando subas tu póster real, cambias esto por: images/toy-story-poster.jpg -->
                <img src="https://placeholder.com" alt="Toy Story 5">
                <div class="item-info">
                    <a href="movies/toy-story-5/index.html">Toy Story 5</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
